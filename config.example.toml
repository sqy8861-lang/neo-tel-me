# Neo-tel-me 配置示例文件
# 复制此文件为 config.toml 并填写你的API密钥

[aliyun_asr]
# 阿里云ASR配置
access_key_id = "your_aliyun_access_key_id"
access_key_secret = "your_aliyun_access_key_secret"
appkey = "your_aliyun_asr_appkey"
sample_rate = 16000
format = "wav"

[minimax_tts]
# MiniMax TTS配置
api_key = "your_minimax_api_key"
voice_id = "female-tianmei"
model = "speech-01"
speed = 1.0
volume = 1.0
pitch = 1.0
sample_rate = 24000

[audio]
# 音频配置
sample_rate = 16000
chunk = 1024
vad_threshold = 0.02

[llm]
# LLM配置

[llm.model]
# 模型配置
provider = "openai"  # 可选: openai, anthropic
model_name = "gpt-4"
api_key = "your_llm_api_key"
base_url = "https://api.openai.com/v1"  # 可选，用于自定义API端点        
temperature = 0.7
max_tokens = 1000

[llm.prompt]
# 提示词配置
personality_prompt = ""  # 个性提示词(200字，会自动生成)
memory_prompt = ""  # 记忆提示词(200字，会自动生成)
max_history = 4  # 最近对话历史数量
[llm.memory]
# 记忆配置
recent_count = 5  # 近期记忆数量
important_only = true  # 只获取重要内容

[websocket]
# WebSocket配置
enabled = false  # 是否启用WebSocket模式（用于H5前端）
host = "0.0.0.0"  # WebSocket服务器主机地址
port = 8766  # WebSocket服务器端口
audio_format = "pcm"  # 音频格式（pcm或mp3）
